<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Vehicle Management - Dashboard</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <div class="container dashboard-container">
    <h1>Vehicle Manager Dashboard</h1>
    <p class="dashboard-intro">Welcome to your personal vehicle management account.</p>

    <section class="dashboard-card">
      <h2>User Information</h2>
      <p><strong>Name:</strong> <span id="userName">Loading...</span></p>
      <p><strong>Email:</strong> <span id="userEmail">Loading...</span></p>
      <p><strong>Vehicles Linked:</strong> <span id="vehicleCount">Loading...</span></p>
    </section>

    <div id="message" class="message"></div>

    <button id="logoutButton" class="submit-btn">Logout</button>
  </div>

  <script type="module" src="../public/js/dashboard.js"></script>
</body>
</html>
